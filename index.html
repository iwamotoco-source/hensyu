<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>THE CALENDAR - 自動修復＆サーバー書き換えツール</title>
  <style>
    body{
      font-family:sans-serif;
      background:#12121a;
      color:#fff;
      padding:20px;
      max-width:600px;
      margin:0 auto;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:20px;
      box-sizing:border-box;
      border-radius:8px;
      border:1px solid #333;
      background:#222;
      color:#fff;
    }

    button{
      padding:15px;
      width:100%;
      background:linear-gradient(135deg,#4f8ef7,#7b5ff8);
      color:#fff;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
      font-size:18px;
    }

    .log{
      margin-top:20px;
      background:#000;
      padding:15px;
      border-radius:8px;
      font-family:monospace;
      color:#0f0;
      white-space:pre-wrap;
      min-height:100px;
      font-size:14px;
      line-height:1.5;
    }
  </style>
</head>
<body>

<h2>GitHub直接修復ツール</h2>

<p>
途切れてしまったコードを過去の正常な状態から復元し、
自動的に最新パッチを当てて、
<strong>直接あなたのGitHubサーバーを書き換えます。</strong>
</p>

<label>GitHub Tokenを入力</label>

<input
  type="password"
  id="token"
  placeholder="ghp_... / github_pat_..."
>

<button id="btn" onclick="runFix()">
  自動復旧＆直接書き換えを実行
</button>

<div class="log" id="log">待機中...</div>

<script>

function log(msg){
  document.getElementById('log').textContent += msg + '\n';
}

function xorStr(str, key){
  let r = '';

  for(let i = 0; i < str.length; i++){
    r += String.fromCharCode(
      str.charCodeAt(i) ^
      key.charCodeAt(i % key.length)
    );
  }

  return btoa(r);
}

function replaceFunc(src, name, newBody){

  const idx = src.indexOf('function ' + name);

  if(idx === -1){
    return src;
  }

  const start = src.indexOf('{', idx);

  if(start === -1){
    return src;
  }

  let count = 1;
  let i = start + 1;

  while(count > 0 && i < src.length){

    if(src[i] === '{'){
      count++;
    }
    else if(src[i] === '}'){
      count--;
    }

    i++;
  }

  return (
    src.substring(0, idx) +
    newBody +
    src.substring(i)
  );
}

async function runFix(){

  const btn = document.getElementById('btn');

  const token = document
    .getElementById('token')
    .value
    .replace(/[^a-zA-Z0-9_-]/g, '');

  if(!token){
    alert('Tokenを入力してください');
    return;
  }

  btn.disabled = true;
  btn.textContent = '処理中...';

  document.getElementById('log').textContent = '';

  try{

    log('1. 正常な過去コード(約100KB)を救出中...');

    const res = await fetch(
      'https://raw.githubusercontent.com/iwamotoco-source/calendar20777789/01c445040b82acf4e51bc8d8967fed8040369890/index.html'
    );

    if(!res.ok){
      throw new Error('過去コードの取得に失敗しました');
    }

    let code = await res.text();

    log('  → 救出成功: ' + code.length + '文字');

    log('2. 最新パッチを適用中...');

    const encToken = xorStr(token, '1220');

    code = code.replace(
      /var DEFAULT_SYNC = \{.*?\};/,
      `var DEFAULT_SYNC = {
        gistId:'0cc0ace61e43ab7603606b686217211c',
        githubToken:'',
        autoSync:false,
        lastSyncAt:'',
        encryptedToken:'${encToken}'
      };`
    );

    if(!code.includes('.pinGate{')){

      const pinCss = `
.pinGate{
  position:fixed;
  inset:0;
  z-index:9999;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.pinGate.hidden{
  display:none;
}
`;

      const pinHtml = `
<div class="pinGate hidden" id="pinGate">

  <div class="pinTitle">PIN CODE</div>

  <div class="pinError" id="pinError"></div>

  <div class="pinDots">
    <div class="pinDot" id="pd1"></div>
    <div class="pinDot" id="pd2"></div>
    <div class="pinDot" id="pd3"></div>
    <div class="pinDot" id="pd4"></div>
  </div>

  <div class="pinPad">
    <button class="pinBtn" onclick="inputPin(1)">1</button>
    <button class="pinBtn" onclick="inputPin(2)">2</button>
    <button class="pinBtn" onclick="inputPin(3)">3</button>
  </div>

</div>
`;

      const pinJs = `
var currentPin='';

function inputPin(n){

  if(currentPin.length < 4){
    currentPin += n;
  }

  if(currentPin.length === 4){
    verifyPin();
  }
}

function verifyPin(){

  if(!state.sync.encryptedToken){
    return;
  }

  try{

    var dec = atob(state.sync.encryptedToken);

    if(dec){

      document
        .getElementById('pinGate')
        .classList.add('hidden');

      if(state.sync.gistId){
        pullFromGist(false);
      }
    }

  }catch(e){

    document
      .getElementById('pinError')
      .textContent = 'PINが違います';
  }
}
`;

      code = code.replace(
        '</style>',
        pinCss + '\n</style>'
      );

      code = code.replace(
        '<div class="app">',
        pinHtml + '\n<div class="app">'
      );

      code = code.replace(
        '/* ===== UTILS ===== */',
        pinJs + '\n/* ===== UTILS ===== */'
      );
    }

    const splashMatch = code.match(
      /setTimeout\(function\(\)\{\s*document\.getElementById\('splash'\)\.(?:style\.display\s*=\s*'none'|classList\.add\('hide'\));/
    );

    if(
      splashMatch &&
      !code.includes(
        "document.getElementById('pinGate').classList.remove"
      )
    ){

      code = code.replace(
        splashMatch[0],
        splashMatch[0] +
`
if(state.sync.encryptedToken && !state.sync.githubToken){
  document.getElementById('pinGate').classList.remove('hidden');
}
else if(state.sync.gistId && state.sync.githubToken){
  pullFromGist(false);
}
`
      );
    }

    log('  → パッチ適用完了');

    log('3. GitHub現在ファイル情報を取得中...');

    const apiRes = await fetch(
      'https://api.github.com/repos/iwamotoco-source/calendar20777789/contents/index.html',
      {
        headers:{
          'Authorization':'token ' + token,
          'Accept':'application/vnd.github.v3+json'
        }
      }
    );

    if(!apiRes.ok){
      throw new Error('GitHub APIアクセスエラー');
    }

    const fileInfo = await apiRes.json();

    const sha = fileInfo.sha;

    log('  → SHA取得成功');

    log('4. GitHubへ上書きアップロード中...');

    const blob = new Blob(
      [code],
      {
        type:'text/html;charset=utf-8'
      }
    );

    const reader = new FileReader();

    reader.onload = async function(){

      const b64 = reader.result.split(',')[1];

      const putRes = await fetch(
        'https://api.github.com/repos/iwamotoco-source/calendar20777789/contents/index.html',
        {
          method:'PUT',

          headers:{
            'Authorization':'token ' + token,
            'Content-Type':'application/json'
          },

          body:JSON.stringify({
            message:'Auto recover index.html',
            content:b64,
            sha:sha
          })
        }
      );

      if(putRes.ok){

        log('\n✅ 成功！GitHubへの直接上書きが完了しました！');

        btn.textContent = '復旧完了！';
      }
      else{

        throw new Error(
          'アップロード失敗: ' +
          await putRes.text()
        );
      }
    };

    reader.readAsDataURL(blob);

  }
  catch(e){

    log('\n❌ エラー: ' + e.message);

    btn.disabled = false;

    btn.textContent = 'やり直す';
  }
}

</script>

</body>
</html>
