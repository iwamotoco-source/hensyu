<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HENSYU FIX</title>

<style>
body{
  background:#111827;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
  max-width:700px;
  margin:auto;
}

input,button{
  width:100%;
  box-sizing:border-box;
  padding:16px;
  border-radius:12px;
  border:none;
  margin-bottom:16px;
  font-size:16px;
}

input{
  background:#1f2937;
  color:#fff;
}

button{
  background:#4f46e5;
  color:#fff;
  font-weight:bold;
}

#log{
  background:#000;
  color:#00ff88;
  padding:16px;
  border-radius:12px;
  white-space:pre-wrap;
  min-height:200px;
  font-family:monospace;
}
</style>
</head>

<body>

<h1>HENSYU FIX TOOL</h1>

<input
  id="token"
  type="password"
  placeholder="GitHub Token"
/>

<button onclick="runFix()">
修復開始
</button>

<div id="log">待機中...</div>

<script>

function log(t){
  document.getElementById('log').textContent += '\n' + t;
}

function b64(str){
  return btoa(unescape(encodeURIComponent(str)));
}

async function runFix(){

  document.getElementById('log').textContent='開始';

  try{

    const token =
      document.getElementById('token')
      .value
      .trim();

    if(!token){
      throw new Error('Token未入力');
    }

    log('GitHub接続中...');

    const api =
      'https://api.github.com/repos/iwamotoco-source/calendar20777789/contents/index.html';

    const current = await fetch(api,{
      headers:{
        Authorization:'token ' + token,
        Accept:'application/vnd.github+json'
      }
    });

    if(!current.ok){

      throw new Error(
        'GitHub接続失敗: ' +
        current.status
      );
    }

    const currentJson =
      await current.json();

    log('SHA取得成功');

    const fixedHtml = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>THE CALENDAR</title>

<style>

body{
  margin:0;
  background:#111827;
  color:#fff;
  font-family:sans-serif;
}

.wrap{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
}

.card{
  width:100%;
  max-width:420px;
  background:#1f2937;
  border-radius:20px;
  padding:24px;
  box-sizing:border-box;
}

input{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#111827;
  color:#fff;
  margin-bottom:14px;
}

button{
  width:100%;
  border:none;
  border-radius:12px;
  padding:14px;
  background:#4f46e5;
  color:#fff;
  font-weight:bold;
}

#status{
  margin-top:20px;
  opacity:.8;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<h1>THE CALENDAR</h1>

<p>復旧済みページ</p>

<input id="memo" placeholder="メモ">

<button onclick="saveMemo()">
保存
</button>

<div id="status">
待機中
</div>

</div>

</div>

<script>

function setStatus(t){
  document.getElementById('status').textContent=t;
}

function saveMemo(){

  const val =
    document.getElementById('memo')
    .value;

  localStorage.setItem(
    'calendar_memo',
    val
  );

  setStatus('保存完了');
}

window.onload=function(){

  document.getElementById('memo').value =
    localStorage.getItem(
      'calendar_memo'
    ) || '';

  setStatus('読み込み完了');
}

<\/script>

</body>
</html>`;

    log('HTML生成完了');

    const upload = await fetch(api,{
      method:'PUT',

      headers:{
        Authorization:'token ' + token,
        Accept:'application/vnd.github+json',
        'Content-Type':'application/json'
      },

      body:JSON.stringify({
        message:'FULL RECOVERY',
        content:b64(fixedHtml),
        sha:currentJson.sha
      })
    });

    if(!upload.ok){

      const txt = await upload.text();

      throw new Error(txt);
    }

    log('SUCCESS');
    log('修復完了');

  }catch(e){

    log('ERROR');
    log(String(e.message));
  }
}

</script>

</body>
</html>
